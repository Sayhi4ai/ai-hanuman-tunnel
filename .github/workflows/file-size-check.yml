name: Prevent Large Files

on: [push, pull_request]

jobs:
  check-large-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Find files > 10MB
        run: |
          LARGE_FILES=$(find . -type f -size +10M | grep -v ".git" || true)
          if [ ! -z "$LARGE_FILES" ]; then
            echo "❌ The following files exceed 10MB:"
            echo "$LARGE_FILES"
            exit 1
          fi

      - name: Success
        run: echo "No large files detected."
